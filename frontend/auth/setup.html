<!DOCTYPE html>
<html lang="en" class="auth-shell">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meshpoint Setup</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/meshpoint-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body" data-auth-mode="setup">

<div class="auth-stage">
    <div class="auth-card">
        <div class="auth-radar" id="radar">
            <svg class="auth-radar__rings" viewBox="0 0 280 280" preserveAspectRatio="xMidYMid meet">
                <circle cx="140" cy="140" r="40"  fill="none" stroke="#233049" stroke-opacity="0.5" stroke-width="1"/>
                <circle cx="140" cy="140" r="80"  fill="none" stroke="#233049" stroke-opacity="0.4" stroke-width="1"/>
                <circle cx="140" cy="140" r="120" fill="none" stroke="#233049" stroke-opacity="0.3" stroke-width="1"/>
                <line x1="140" y1="14"  x2="140" y2="22"  stroke="#64748b" stroke-opacity="0.5" stroke-width="1"/>
                <line x1="140" y1="258" x2="140" y2="266" stroke="#64748b" stroke-opacity="0.5" stroke-width="1"/>
                <line x1="14"  y1="140" x2="22"  y2="140" stroke="#64748b" stroke-opacity="0.5" stroke-width="1"/>
                <line x1="258" y1="140" x2="266" y2="140" stroke="#64748b" stroke-opacity="0.5" stroke-width="1"/>
            </svg>
            <div class="auth-radar__sweep"></div>
            <div class="auth-radar__center"></div>
        </div>

        <div class="auth-heading">
            <div class="auth-heading__title">First-time setup</div>
            <div class="auth-heading__sub">
                Set an admin password.<br>
                You'll need this every time you open the dashboard.
            </div>
        </div>

        <div class="auth-identity">
            <div class="auth-identity__name" id="identity-name">Meshpoint</div>
            <div class="auth-identity__meta">
                <span class="auth-identity__val" id="identity-version">v...</span>
                <span class="auth-identity__sep">.</span>
                <span class="auth-identity__live">. Online</span>
            </div>
        </div>

        <form class="auth-form" id="auth-form" novalidate>
            <div class="auth-input-wrap">
                <input
                    type="password"
                    class="auth-input"
                    id="password-input"
                    placeholder="set admin password"
                    autocomplete="new-password"
                    autofocus>
            </div>
            <div class="auth-input-wrap">
                <input
                    type="password"
                    class="auth-input"
                    id="confirm-input"
                    placeholder="confirm password"
                    autocomplete="new-password">
            </div>

            <div class="auth-rules" id="rules">
                <div class="auth-rule" data-rule="length">
                    <span class="auth-rule__dot"></span>
                    <span>At least 8 characters</span>
                </div>
                <div class="auth-rule" data-rule="match">
                    <span class="auth-rule__dot"></span>
                    <span>Both passwords match</span>
                </div>
                <div class="auth-rule auth-rule--ok" data-rule="storage">
                    <span class="auth-rule__dot"></span>
                    <span>Stored hashed (bcrypt) on this device only</span>
                </div>
            </div>

            <div class="auth-error" id="error-msg" role="alert" aria-live="polite"></div>

            <button type="submit" class="auth-button" id="submit-btn">
                <span class="auth-button__label" id="btn-label">Set and Continue</span>
                <span class="auth-button__arrow">&rsaquo;</span>
                <span class="auth-button__dots">
                    <span></span><span></span><span></span>
                </span>
            </button>
        </form>
    </div>

    <div class="auth-footer">
        meshpoint
        <span class="auth-footer__sep">.</span>
        <a href="https://meshradar.io" target="_blank" rel="noopener">meshradar.io</a>
    </div>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
