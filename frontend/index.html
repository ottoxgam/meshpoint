<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Point</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
    <header class="top-bar">
        <div class="top-bar__left">
            <span id="ws-status" class="status-dot status-dot--disconnected"></span>
            <span id="ws-label" class="status-label">Connecting...</span>
            <span class="top-bar__divider">|</span>
            <span id="stat-nodes" class="top-bar__stat">0 nodes</span>
            <span class="top-bar__divider">|</span>
            <span id="stat-packets" class="top-bar__stat">0 packets</span>
        </div>
        <div class="top-bar__right">
            <span id="device-name" class="top-bar__device"></span>
            <span id="device-version" class="top-bar__version"></span>
        </div>
    </header>

    <main class="dashboard">
        <section class="dashboard__map">
            <div class="panel">
                <div class="panel__header">Node Map</div>
                <div id="map" class="panel__body map-container"></div>
            </div>
        </section>

        <section class="dashboard__side">
            <div class="panel panel--nodes">
                <div class="panel__header">
                    <span>Nodes</span>
                    <input type="text" id="node-search" class="node-search" placeholder="Search..." />
                </div>
                <div class="panel__body" id="node-list"></div>
            </div>
        </section>

        <section class="dashboard__feed">
            <div class="panel">
                <div class="panel__header">
                    Packets
                    <span class="packet-count" id="packet-count">0</span>
                </div>
                <div class="panel__body">
                    <table class="packet-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Source</th>
                                <th>Protocol</th>
                                <th>Type</th>
                                <th>RSSI</th>
                                <th>SNR</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody id="packet-tbody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="js/websocket_client.js"></script>
    <script src="js/components/node_map.js"></script>
    <script src="js/simple_node_list.js"></script>
    <script src="js/simple_packet_feed.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
